services:
  web:
    build:
      context: .
    ports:
      - "3010:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: http://localhost:3010
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      YOUTUBE_CHANNEL_ID: ${YOUTUBE_CHANNEL_ID:-UC5VgjG5dv42qYKxIYUXoqUw}
      YOUTUBE_CHANNEL_HANDLE: ${YOUTUBE_CHANNEL_HANDLE:-@growwith_Neetu}
      NEXT_PUBLIC_YOUTUBE_CHANNEL_URL: ${NEXT_PUBLIC_YOUTUBE_CHANNEL_URL:-https://www.youtube.com/channel/UC5VgjG5dv42qYKxIYUXoqUw}
